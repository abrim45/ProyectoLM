<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memeneba | ¡Juegos reales, precios de risa!</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="logo-container">
        <i class="fas fa-grin-squint meme-icon"></i>
        <a href="#" class="logo">MEMENEBA</a>
      </div>
      <div class="search-container">
        <input
          type="text"
          id="search-bar"
          placeholder="Busca Elden Ring, Mario, Zelda..."
        />
        <button><i class="fas fa-search"></i></button>
      </div>
      <div class="header-actions">
        <div class="action-group">
          <i class="fas fa-heart"></i>
          <span>FAVORITOS</span>
        </div>
        <div class="action-group">
          <i class="fas fa-shopping-cart">
            <span class="cart-count">0</span>
          </i>
          <span>CARRITO</span>
        </div>
        <div class="action-group">
          <i class="fas fa-user-circle"></i>
          <span>CUENTA</span>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div>
          <h1>¡JUEGAZOS A PRECIOS ABSURDOS!</h1>
          <p>
            Tu cartera se va a reír tanto como tú. Aprovecha antes de que nos
            demos cuenta del error.
          </p>
          <a href="#" class="btn-primary">Saquear la tienda</a>
        </div>
      </section>

      <div class="store-container">
        <aside class="sidebar-filters">
          <div class="filter-box">
            <h3><i class="fas fa-filter"></i> Filtros Reales</h3>

            <div class="filter-group">
              <h4>Plataforma</h4>
              <label
                ><input
                  type="checkbox"
                  class="filter-platform"
                  value="PC"
                  checked
                />
                <i class="fas fa-desktop"></i> PC</label
              >
              <label
                ><input
                  type="checkbox"
                  class="filter-platform"
                  value="PlayStation"
                  checked
                />
                <i class="fab fa-playstation"></i> PlayStation</label
              >
              <label
                ><input
                  type="checkbox"
                  class="filter-platform"
                  value="Xbox"
                  checked
                />
                <i class="fab fa-xbox"></i> Xbox</label
              >
              <label
                ><input
                  type="checkbox"
                  class="filter-platform"
                  value="Nintendo"
                  checked
                />
                <i class="fas fa-gamepad"></i> Nintendo</label
              >
            </div>

            <div class="filter-group">
              <h4>Precio Máximo: <span id="price-display">70€</span></h4>
              <input
                type="range"
                id="price-filter"
                min="1"
                max="80"
                value="80"
                class="price-slider"
              />
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  font-weight: bold;
                  margin-top: 5px;
                  font-size: 12px;
                "
              >
                <span>1€</span>
                <span>80€</span>
              </div>
            </div>
          </div>
        </aside>

        <div class="product-section">
          <h2 class="section-title">
            <i class="fas fa-fire"></i> Catálogo Completo
          </h2>

          <div class="product-grid" id="game-grid"></div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
