<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memeneba | ¡Juegos reales, precios de risa!</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main>
      <section class="hero">
        <div>
          <h1>¡JUEGAZOS A PRECIOS ABSURDOS!</h1>
          <p>
            Tu cartera se va a reír tanto como tú. Aprovecha antes de que nos
            demos cuenta del error
          </p>
          <a href="loot.html" class="btn-primary">Saquear la tienda</a>
        </div>
      </section>

      <div class="store-container">
        <aside class="sidebar-filters">
          <div class="filter-box">
            <h3><i class="fas fa-filter"></i> Filtros Bombasticos</h3>
            <div class="filter-group">
              <h4>Plataforma</h4>
              <label
                ><input
                  type="checkbox"
                  class="filter-platform"
                  value="PC"
                  checked
                />
                <i class="fas fa-desktop"></i> PC</label
              >
              <label
                ><input
                  type="checkbox"
                  class="filter-platform"
                  value="PlayStation"
                  checked
                />
                <i class="fab fa-playstation"></i> PlayStation</label
              >
              <label
                ><input
                  type="checkbox"
                  class="filter-platform"
                  value="Xbox"
                  checked
                />
                <i class="fab fa-xbox"></i> Xbox</label
              >
              <label
                ><input
                  type="checkbox"
                  class="filter-platform"
                  value="Nintendo"
                  checked
                />
                <i class="fas fa-gamepad"></i> Nintendo</label
              >
            </div>
            <div class="filter-group">
              <h4>Precio Máximo: <span id="price-display">80€</span></h4>
              <input
                type="range"
                id="price-filter"
                min="1"
                max="80"
                value="80"
                class="price-slider"
              />
            </div>
          </div>
        </aside>

        <div class="product-section">
          <h2 class="section-title">
            <i class="fas fa-fire"></i> Catálogo Completo
          </h2>
          <div class="product-grid" id="game-grid"></div>
        </div>
      </div>
    </main>

    <div id="qty-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <h3>¿Cuántas copias quieres?</h3>
        <p
          id="modal-game-title"
          style="
            font-weight: 600;
            font-size: 18px;
            color: var(--primary-purple);
          "
        ></p>
        <div class="qty-controls">
          <button id="qty-minus" class="qty-btn">-</button>
          <input
            type="number"
            id="qty-input"
            value="1"
            min="1"
            max="99"
            readonly
          />
          <button id="qty-plus" class="qty-btn">+</button>
        </div>
        <div
          style="
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
          "
        >
          <button
            id="modal-cancel"
            class="btn-secondary"
            style="padding: 10px 20px; border-radius: 8px; cursor: pointer"
          >
            Cancelar
          </button>
          <button
            id="modal-confirm"
            class="btn-primary"
            style="padding: 10px 20px; border: none; cursor: pointer"
          >
            Añadir al Carrito
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
