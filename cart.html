<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu Carrito | Memeba</title>
    <link rel="icon" type="image/png" href="assets/favicon.png"/>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main style="max-width: 800px;">
        <div class="page-header-box">
            <h2 class="section-title"><i class="fas fa-shopping-cart" style="color: var(--primary-purple);"></i> Tu Carrito de Risa</h2>
        </div>
        
        <div id="cart-items-container" class="cart-container">
            </div class="cart-summary">
        <h3>
          Total a pagar:
          <span id="cart-total-price" style="color: var(--price-green)"
            >0.00€</span
          >
        </h3>
        <button
          class="btn-primary"
          style="width: 100%; font-size: 20px; padding: 15px"
        >
          PAGAR Y REÍR
        </button>
      </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>
  </body>
</html>
