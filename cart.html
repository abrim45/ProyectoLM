<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu Carrito | Memeba</title>
    <link rel="icon" type="image/png" href="assets/favicon.png"/>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main style="max-width: 800px; margin: 0 auto;">
        
        <div class="page-header-box">
            <h2 class="section-title"><i class="fas fa-shopping-cart" style="color: var(--primary-purple);"></i> Tu Carrito de Risa</h2>
        </div>
        
        <div id="cart-items-container" class="cart-container">
            </div>

        <div class="cart-summary" style="padding: 20px; text-align: right; background: #fff; border: 2px solid #000; border-radius: 12px; box-shadow: 4px 4px 0px rgba(0,0,0,1);">
            
            <div style="display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin-bottom: 15px;">
                <h3 style="font-size: 24px; margin: 0;">Total a pagar:</h3>
                <span id="cart-total-price" style="color: var(--price-green); font-size: 32px; font-weight: 900;">0.00€</span>
            </div>
            
            <button id="btn-checkout" class="btn-primary" style="width: 100%; font-size: 20px; padding: 15px; background-color: var(--price-green); color: white;">
                <i class="fas fa-money-check-alt"></i> PAGAR Y REÍR
            </button>
        </div>
        
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>
  </body>
</html>
