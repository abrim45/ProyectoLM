<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión | Memeba</title>
    <link rel="icon" type="image/png" href="assets/favicon.png"/>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main class="auth-container">
      <div class="auth-box">
        <h2 style="margin: 0; color: var(--primary-purple)">
          <i class="fas fa-sign-in-alt"></i> Entrar a Saquear
        </h2>
        <p>Inicia sesión para guardar tus chollos</p>

        <form id="login-form" class="auth-form">
    <input type="text" id="login-user" class="auth-input" placeholder="Usuario" required>
    <input type="password" id="login-pass" class="auth-input" placeholder="Contraseña" required>
    <button type="submit" class="btn-primary">¡Pa' dentro!</button>
</form>

        <a href="register.html" class="auth-link"
          >¿No tienes cuenta? ¡Créate una aquí!</a
        >
      </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>
  </body>
</html>
