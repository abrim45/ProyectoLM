<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta | Memeba</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main class="auth-container">
      <div class="auth-box">
        <h2 style="margin: 0; color: var(--price-green)">
          <i class="fas fa-user-plus"></i> Únete al Meme
        </h2>
        <p>Regístrate y empieza a comprar juegazos</p>

        <form id="register-form" class="auth-form">
    <input type="text" id="reg-user" class="auth-input" placeholder="Elige un Usuario" required>
    <input type="password" id="reg-pass" class="auth-input" placeholder="Contraseña secreta" required>
    <button type="submit" class="btn-primary">¡Crear cuenta!</button>
</form>

        <a href="login.html" class="auth-link"
          >¿Ya eres un risueño? Inicia sesión</a
        >
      </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>
  </body>
</html>
