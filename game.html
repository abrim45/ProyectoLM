<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cargando juego... | Memeba</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/game.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main class="game-page-container">
      <div class="game-top-section">
        <div class="game-image-box">
          <img id="g-img" src="" alt="Portada del juego" />
        </div>

        <div class="game-info-box">
          <span id="g-platform" class="platform-badge">PC</span>
          <h1 id="g-title">Cargando...</h1>

          <div class="game-price-box">
            <span id="g-old-price" class="old-price"></span>
            <span id="g-new-price" class="new-price"></span>
          </div>

          <p id="g-desc" class="game-description">Cargando descripción...</p>

          <div class="game-actions">
            <button id="g-btn-cart" class="btn-buy cart-btn">
              Añadir al carrito <i class="fas fa-shopping-cart"></i>
            </button>
            <button id="g-btn-fav" class="btn-fav like-btn">
              <i class="far fa-heart"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="game-reviews-section">
        <div class="reviews-header">
          <h2>Reseñas de la comunidad</h2>
          <div class="average-rating">
            <i class="fas fa-star"></i> <span id="g-rating-avg">0.0</span>/5
          </div>
        </div>

        <div id="g-reviews-list" class="reviews-grid"></div>
      </div>
      <div class="review-form-container" style="margin-top: 40px; background: #fffacd; padding: 25px; border: 3px solid #000; border-radius: 12px; box-shadow: 6px 6px 0px rgba(0,0,0,1);">
            <h3 style="color: var(--primary-purple); margin-top: 0; font-size: 26px;">
                <i class="fas fa-pen-nib"></i> Deja tu opinión
            </h3>
            
            <form id="review-form">
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: 900; display: block; margin-bottom: 8px; font-size: 18px;">Puntuación:</label>
                    
                    <div id="interactive-stars" style="font-size: 32px; cursor: pointer; color: #ccc; display: inline-block;">
                        <i class="fas fa-star" data-value="1" style="transition: all 0.1s;"></i>
                        <i class="fas fa-star" data-value="2" style="transition: all 0.1s;"></i>
                        <i class="fas fa-star" data-value="3" style="transition: all 0.1s;"></i>
                        <i class="fas fa-star" data-value="4" style="transition: all 0.1s;"></i>
                        <i class="fas fa-star" data-value="5" style="transition: all 0.1s;"></i>
                    </div>
                    
                    <input type="hidden" id="review-score" value="1">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="font-weight: 900; display: block; margin-bottom: 8px; font-size: 18px;">Tu comentario:</label>
                    <textarea id="review-comment" rows="4" placeholder="¿Qué te ha parecido el juego? ¡No te cortes!..." style="width: 100%; padding: 12px; box-sizing: border-box;min-height: 20px; border: 3px solid #000; border-radius: 8px; font-size: 16px; font-family: 'Fredoka', sans-serif; resize: vertical;" required></textarea>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; font-size: 22px; padding: 15px;">
                    <i class="fas fa-paper-plane"></i> Publicar Reseña
                </button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/app.js"></script>
  </body>
</html>
